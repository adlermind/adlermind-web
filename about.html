<style>
:root {
  --am-rose: #E8929A; --am-sage: #8FBFB8; --am-gray: #6B6B6B;
  --am-bg: #FAFAF8; --am-muted: #9a9490; --am-border: #e8e4e0; --am-white: #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; font-weight: 300; color: var(--am-gray); background: var(--am-white); min-height: 100vh; display: flex; flex-direction: column; }
nav {
  position: sticky; top: 0; z-index: 100; background: var(--am-white);
  border-bottom: 0.5px solid var(--am-border); padding: 0 32px;
  display: flex; align-items: center; gap: 32px; height: 60px;
}
.nav-logo img { height: 40px; display: block; margin-top: 4px; }
.nav-links { display: flex; align-items: center; gap: 24px; flex: 1; }
.nav-links a { font-size: 13px; color: var(--am-gray); text-decoration: none; transition: color 0.15s; }
.nav-links a:hover, .nav-links a.active { color: var(--am-sage); }
.nav-login-link {
  margin-left: auto; font-size: 12px; color: var(--am-muted);
  text-decoration: none; letter-spacing: 0.04em;
  transition: color 0.15s; white-space: nowrap;
}
.nav-login-link:hover { color: var(--am-sage); }
.nav-login-mobile { display: none; }
.nav-member-btn {
  padding: 7px 18px; background: var(--am-sage); color: #fff;
  border: none; border-radius: 2px; font-size: 12px; font-family: 'Noto Sans KR', sans-serif;
  font-weight: 300; cursor: pointer; text-decoration: none; transition: background 0.15s; white-space: nowrap;
}
.nav-member-btn:hover { background: #6fa8a0; }
.nav-ham { display: none; border: none; background: none; cursor: pointer; font-size: 22px; color: var(--am-gray); }
.coming-wrap {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 80px 32px; text-align: center; background: var(--am-bg);
}
.coming-label {
  font-family: 'Raleway', sans-serif; font-size: 10px; font-weight: 200;
  letter-spacing: 0.3em; color: var(--am-muted); text-transform: uppercase; margin-bottom: 28px;
}
.coming-line {
  width: 40px; height: 0.5px; background: var(--am-sage); margin: 0 auto 32px;
}
.coming-title {
  font-family: 'Noto Serif KR', serif; font-size: 22px; font-weight: 300;
  color: var(--am-gray); margin-bottom: 16px;
}
.coming-desc { font-size: 13px; color: var(--am-muted); line-height: 2; margin-bottom: 36px; }
.coming-date {
  font-family: 'Raleway', sans-serif; font-size: 11px; letter-spacing: 0.12em;
  color: var(--am-sage); border: 0.5px solid rgba(143,191,184,0.4);
  padding: 8px 20px; margin-bottom: 32px;
}
.back-link { font-size: 12px; color: var(--am-muted); text-decoration: none; }
.back-link:hover { color: var(--am-sage); }
@media (max-width: 720px) {
  nav { padding: 0 20px; }
  .nav-links { display: none; }
  .nav-links.open { display: flex; flex-direction: column; position: fixed; top: 60px; left: 0; right: 0; background: var(--am-white); border-bottom: 0.5px solid var(--am-border); padding: 20px; gap: 16px; z-index: 99; }
  .nav-ham { display: block; margin-left: auto; }
  .nav-login-link { display: none; }
  .nav-login-mobile { display: block !important; }
}

<nav>

document.getElementById('navHam').addEventListener('click', () => {
  document.getElementById('navLinks').classList.toggle('open');

(async () => {
  const _sbNav = supabase.createClient(SB_URL, SB_KEY);
  const { data: { session } } = await _sbNav.auth.getSession();
  if (!session) return;
  const res = await fetch(
    `${SB_URL}/rest/v1/site_users?user_id=eq.${session.user.id}&select=nickname`,

  );
  const [u] = await res.json();
  if (!u) return;
  ['navLoginLink','navLoginMobile'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.textContent = u.nickname; el.href = 'mypage.html'; }
  });
})();
