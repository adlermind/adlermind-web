<style>
:root {
  --am-rose:   #E8929A;
  --am-sage:   #8FBFB8;
  --am-blue:   #8FAFD4;
  --am-gray:   #6B6B6B;
  --am-pale:   #D8D8DC;
  --am-bg:     #FAFAF8;
  --am-muted:  #9a9490;
  --am-border: #e8e4e0;
  --am-white:  #ffffff;
  --am-dark:   #3d3a36;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; font-weight: 300; color: var(--am-gray); background: var(--am-white); }

nav {
  position: sticky; top: 0; z-index: 100;
  background: var(--am-white); border-bottom: 0.5px solid var(--am-border);
  padding: 0 32px; display: flex; align-items: center; gap: 32px; height: 60px;
}
.nav-logo img { height: 40px; display: block; margin-top: 4px; }
.nav-links { display: flex; align-items: center; gap: 24px; flex: 1; }
.nav-links a { font-size: 13px; color: var(--am-gray); text-decoration: none; transition: color 0.15s; }
.nav-links a:hover, .nav-links a.active { color: var(--am-sage); }
.nav-login-link {
  margin-left: auto; font-size: 12px; color: var(--am-muted);
  text-decoration: none; letter-spacing: 0.04em;
  transition: color 0.15s; white-space: nowrap;
}
.nav-login-link:hover { color: var(--am-sage); }
.nav-login-mobile { display: none; }
.nav-member-btn {
  padding: 7px 18px;
  background: var(--am-sage); color: #fff; border: none; border-radius: 2px;
  font-size: 12px; font-family: 'Noto Sans KR', sans-serif; font-weight: 300;
  cursor: pointer; text-decoration: none; transition: background 0.15s; white-space: nowrap;
}
.nav-member-btn:hover { background: #6fa8a0; }
.nav-ham { display: none; border: none; background: none; cursor: pointer; font-size: 22px; color: var(--am-gray); }

.page-hero {
  background: var(--am-bg); padding: 56px 32px 48px;
  border-bottom: 0.5px solid var(--am-border);
}
.page-hero-inner { max-width: 760px; margin: 0 auto; }
.page-label {
  font-family: 'Raleway', sans-serif; font-size: 10px; font-weight: 300;
  letter-spacing: 0.22em; color: var(--am-rose); text-transform: uppercase; margin-bottom: 12px;
}
.page-title { font-family: 'Noto Serif KR', serif; font-size: 28px; font-weight: 300; color: var(--am-gray); }

.page-body { max-width: 760px; margin: 0 auto; padding: 40px 32px 80px; }

.cat-tabs { display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
.cat-tab {
  padding: 6px 16px; border: 0.5px solid var(--am-border);
  background: var(--am-white); font-size: 12px; color: var(--am-muted);
  cursor: pointer; transition: all 0.15s;
  font-family: 'Noto Sans KR', sans-serif; font-weight: 300;
}
.cat-tab:hover { border-color: var(--am-sage); color: var(--am-sage); }
.cat-tab.active { background: var(--am-sage); color: #fff; border-color: var(--am-sage); }

.board-list { border-top: 0.5px solid var(--am-border); }
.board-item {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 0; border-bottom: 0.5px solid var(--am-border);
  cursor: pointer; transition: opacity 0.15s;
}
.board-item:hover { opacity: 0.7; }
.board-cat {
  font-family: 'Raleway', sans-serif; font-size: 9px; letter-spacing: 0.08em;
  padding: 3px 8px; flex-shrink: 0;
}
.cat-공지 { background: rgba(232,146,154,0.1); color: var(--am-rose); }
.cat-회의록 { background: rgba(143,191,184,0.12); color: #5a9990; }
.cat-서류 { background: rgba(143,175,212,0.12); color: var(--am-blue); }
.board-title { flex: 1; font-size: 14px; color: var(--am-gray); }
.board-meta { font-size: 11px; color: var(--am-muted); white-space: nowrap; font-family: 'Raleway', sans-serif; }
.board-empty { text-align: center; padding: 56px 0; color: var(--am-muted); font-size: 13px; }

/* 모달 */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(60,55,50,0.4); z-index: 500;
  align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--am-white); width: 100%; max-width: 600px;
  max-height: 85vh; overflow-y: auto; padding: 28px 28px 36px;
}
.modal-hd { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; gap: 12px; }
.modal-title { font-family: 'Noto Serif KR', serif; font-size: 16px; color: var(--am-gray); line-height: 1.5; }
.modal-close { border: none; background: none; cursor: pointer; color: var(--am-muted); font-size: 20px; flex-shrink: 0; }
.modal-close:hover { color: var(--am-gray); }
.modal-meta { font-size: 11px; color: var(--am-muted); margin-bottom: 18px; }
.modal-content {
  font-size: 14px; color: var(--am-gray); line-height: 1.9;
  border-top: 0.5px solid var(--am-border); padding-top: 18px;
}
.modal-content img { max-width: 100%; height: auto; margin: 8px 0; border-radius: 2px; }
.modal-content iframe { max-width: 100%; }
.modal-content h1 { font-size: 20px; font-family: 'Noto Serif KR', serif; font-weight: 400; margin: 16px 0 8px; }
.modal-content h2 { font-size: 17px; font-family: 'Noto Serif KR', serif; font-weight: 400; margin: 14px 0 8px; }
.modal-content h3 { font-size: 15px; font-weight: 400; margin: 12px 0 6px; }
.modal-content p { margin: 0 0 8px; }
.modal-content ul, .modal-content ol { padding-left: 20px; margin-bottom: 8px; }
.modal-content blockquote { border-left: 3px solid #e8e4e0; padding-left: 14px; color: var(--am-muted); margin: 8px 0; }
.modal-content a { color: var(--am-blue); }
.modal-attachments { margin-top: 18px; border-top: 0.5px solid var(--am-border); padding-top: 14px; }
.modal-attachments-label { font-size: 11px; color: var(--am-muted); margin-bottom: 8px; }
.attach-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border: 0.5px solid var(--am-border);
  margin-bottom: 6px; background: var(--am-bg);
}
.attach-item-name { flex: 1; font-size: 12px; color: var(--am-gray); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.attach-dl {
  display: flex; align-items: center; gap: 4px;
  font-size: 11px; color: var(--am-blue); text-decoration: none;
  padding: 4px 10px; border: 0.5px solid rgba(143,175,212,0.3);
  transition: background 0.15s; flex-shrink: 0;
}
.attach-dl:hover { background: rgba(143,175,212,0.08); }

footer {
  background: var(--am-bg); border-top: 0.5px solid var(--am-border); padding: 48px 32px;
}
.footer-inner { max-width: 900px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 32px; justify-content: space-between; }
.footer-logo img { height: 32px; margin-bottom: 10px; }
.footer-info { font-size: 12px; color: var(--am-muted); line-height: 2; }
.footer-nav { display: flex; flex-direction: column; gap: 8px; }
.footer-nav a { font-size: 12px; color: var(--am-muted); text-decoration: none; }
.footer-nav a:hover { color: var(--am-sage); }
.footer-copy { max-width: 900px; margin: 24px auto 0; font-size: 11px; color: var(--am-muted); font-family: 'Raleway', sans-serif; border-top: 0.5px solid var(--am-border); padding-top: 16px; }

@media (max-width: 720px) {
  nav { padding: 0 20px; }
  .nav-links { display: none; }
  .nav-links.open { display: flex; flex-direction: column; position: fixed; top: 60px; left: 0; right: 0; background: var(--am-white); border-bottom: 0.5px solid var(--am-border); padding: 20px; gap: 16px; z-index: 99; }
  .nav-ham { display: block; margin-left: auto; }
  .nav-login-link { display: none; }
  .nav-login-mobile { display: block !important; }
  .page-body { padding: 32px 20px 60px; }
  .page-hero { padding: 40px 20px 32px; }
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">
    <img src="image/adlermind_logo.png" alt="ADLER MIND 협동조합">
  </a>
  <div class="nav-links" id="navLinks">
    <a href="about.html">협동조합 소개</a>
    <a href="counseling.html">심리상담</a>
    <a href="education.html">교육·연수</a>
    <a href="news.html" class="active">소식</a>
    <a href="contact.html">문의</a>
    <a id="navLoginMobile" class="nav-login-mobile" href="login.html">로그인</a>
  </div>
  <a id="navLoginLink" class="nav-login-link" href="login.html">로그인</a>
  <a class="nav-member-btn" href="members.html">조합원 마당</a>
  <button class="nav-ham" id="navHam">&#9776;</button>
</nav>

<div class="page-hero">
  <div class="page-hero-inner">
    <div class="page-label">NEWS</div>
    <h1 class="page-title">조합 소식</h1>
  </div>
</div>

<div class="page-body">
  <div class="cat-tabs">
    <button class="cat-tab active" onclick="filterCat('전체', this)">전체</button>
    <button class="cat-tab" onclick="filterCat('공지', this)">공지</button>
    <button class="cat-tab" onclick="filterCat('회의록', this)">회의록</button>
    <button class="cat-tab" onclick="filterCat('서류', this)">서류</button>
  </div>
  <div class="board-list" id="boardList">
    <div class="board-empty">불러오는 중...</div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-hd">
      <div class="modal-title" id="mTitle"></div>
      <button class="modal-close" onclick="closeModal()">&#10005;</button>
    </div>
    <div class="modal-meta" id="mMeta"></div>
    <button class="modal-copy-link" id="mCopyLink" style="font-size:12px;color:var(--am-sage);background:none;border:1px solid var(--am-sage);border-radius:3px;padding:4px 12px;cursor:pointer;margin-bottom:14px;">게시물 링크 복사</button>
    <div class="modal-content" id="mContent"></div>
    <div id="mAttachments"></div>
  </div>
</div>

<footer>
  <div class="footer-inner">
    <div>
      <div class="footer-logo"><img src="image/adlermind_logo.png" alt="ADLER MIND 협동조합"></div>
      <div class="footer-info">
        ADLER MIND 협동조합 (일반협동조합)<br>
        경기도 광주시 남종면 산수로 1652-16<br>
        adlermindcoop@gmail.com
      </div>
    </div>
    <nav class="footer-nav">
      <a href="about.html">협동조합 소개</a>
      <a href="counseling.html">심리상담</a>
      <a href="education.html">교육·연수</a>
      <a href="contact.html">문의</a>
      <a href="members.html">조합원 마당</a>
    </nav>
  </div>
  <div class="footer-copy">&copy; 2026 ADLER MIND 협동조합. All rights reserved.</div>
</footer>

<script>
const SB_URL = 'https://jboceiacgczkqkhqcmqu.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impib2NlaWFjZ2N6a3FraHFjbXF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1OTg1MTYsImV4cCI6MjA5ODE3NDUxNn0.9jHLNB8PVDrWlSc5CDGz5j6ZF9yaKwrnzICvvvsFbvA';
const hdrs = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` };

let allPosts = [];
let currentCat = '전체';

async function loadPosts() {
  try {
    const res = await fetch(`${SB_URL}/rest/v1/board_posts?visibility=eq.public&order=is_pinned.desc,created_at.desc`, { headers: hdrs });
    allPosts = await res.json();
    if (!Array.isArray(allPosts)) allPosts = [];
    render();
    const postId = new URLSearchParams(window.location.search).get('post');
    if (postId && allPosts.some(p => p.id === postId)) openModal(postId);
  } catch(e) {
    document.getElementById('boardList').innerHTML = '<div class="board-empty">소식을 불러올 수 없습니다.</div>';
  }
}

function render() {
  const el = document.getElementById('boardList');
  const list = currentCat === '전체' ? allPosts : allPosts.filter(p => p.category === currentCat);
  if (!list.length) { el.innerHTML = '<div class="board-empty">게시물이 없습니다.</div>'; return; }
  el.innerHTML = list.map(p => {
    const date = new Date(p.created_at).toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' });
    return `<div class="board-item" onclick="openModal('${p.id}')">
      <span class="board-cat cat-${esc(p.category)}">${esc(p.category)}</span>
      <div class="board-title">${esc(p.title)}</div>
      <div class="board-meta">${date}</div>
    </div>`;
  }).join('');
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function openModal(id) {
  const p = allPosts.find(x => x.id === id); if (!p) return;
  history.pushState({}, '', `news.html?post=${id}`);
  document.getElementById('mCopyLink').onclick = () => copyPostLink(id);
  document.getElementById('mTitle').textContent = p.title;
  const date = new Date(p.created_at).toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' });
  document.getElementById('mMeta').textContent = `${p.category} · ${p.author} · ${date}`;
  document.getElementById('mContent').innerHTML = p.content || '';
  const attachments = p.attachments || [];
  if (attachments.length) {
    document.getElementById('mAttachments').innerHTML = `
      <div class="modal-attachments">
        <div class="modal-attachments-label">첨부파일 ${attachments.length}개</div>
        ${attachments.map(f => `
          <div class="attach-item">
            <span class="attach-item-name">${esc(f.name)}</span>
            <a class="attach-dl" href="${esc(f.url)}?download=${encodeURIComponent(f.name)}" download="${esc(f.name)}" target="_blank">다운로드</a>
          </div>`).join('')}
      </div>`;
  } else {
    document.getElementById('mAttachments').innerHTML = '';
  }
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  history.pushState({}, '', 'news.html');
}
document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });

function copyPostLink(id) {
  const url = `${window.location.origin}/news.html?post=${id}`;
  navigator.clipboard.writeText(url);
  alert('링크가 복사되었습니다');
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.getElementById('navHam').addEventListener('click', () => {
  document.getElementById('navLinks').classList.toggle('open');
});

loadPosts();

(async () => {
  const _sbNav = supabase.createClient(SB_URL, SB_KEY);
  const { data: { session } } = await _sbNav.auth.getSession();
  if (!session) return;
  const res = await fetch(
    `${SB_URL}/rest/v1/site_users?user_id=eq.${session.user.id}&select=nickname`,
    { headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` } }
  );
  const [u] = await res.json();
  if (!u) return;
  ['navLoginLink','navLoginMobile'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.textContent = u.nickname + '님의 Life Style'; el.href = 'mypage.html'; }
  });
})();
</script>
</body>
</html>
