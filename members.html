<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="image/favicon.png">
<link rel="icon" type="image/webp" href="image/favicon.webp">
<title>조합원 로그인 · ADLER MIND 협동조합</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&family=Noto+Sans+KR:wght@300;400&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
<style>
:root {
  --am-rose:   #E8929A;
  --am-sage:   #8FBFB8;
  --am-gray:   #6B6B6B;
  --am-pale:   #D8D8DC;
  --am-bg:     #FAFAF8;
  --am-muted:  #9a9490;
  --am-border: #e8e4e0;
  --am-white:  #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 300;
  background: var(--am-bg);
  color: var(--am-gray);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.login-wrap {
  width: 100%; max-width: 360px;
}
.logo-box { text-align: center; margin-bottom: 32px; }
.logo-box img { height: 57px; margin-top: 4px; }
.login-box {
  background: var(--am-white);
  border: 0.5px solid var(--am-border);
  padding: 36px 32px 40px;
}
.login-label {
  font-family: 'Raleway', sans-serif;
  font-size: 10px; font-weight: 200;
  letter-spacing: 0.22em;
  color: var(--am-muted);
  text-transform: uppercase;
  margin-bottom: 20px;
  text-align: center;
}
.login-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 15px; color: var(--am-gray);
  text-align: center; margin-bottom: 28px;
}
.field-label {
  font-size: 11px; color: var(--am-muted);
  margin-bottom: 6px;
}
.pw-input {
  width: 100%;
  border: 0.5px solid var(--am-border);
  border-radius: 0;
  padding: 12px 14px;
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 300;
  background: var(--am-bg);
  color: var(--am-gray);
  letter-spacing: 0.12em;
  transition: border-color 0.15s;
}
.pw-input:focus { outline: none; border-color: var(--am-sage); }
.login-err {
  font-size: 12px; color: var(--am-rose);
  margin-top: 8px; display: none;
}
.login-btn {
  width: 100%; margin-top: 20px;
  padding: 13px;
  background: var(--am-sage); color: #fff;
  border: none;
  font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 300;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: background 0.15s;
}
.login-btn:hover { background: #6fa8a0; }
.back-link {
  display: block; text-align: center;
  margin-top: 20px;
  font-size: 12px; color: var(--am-muted);
  text-decoration: none;
  letter-spacing: 0.04em;
}
.back-link:hover { color: var(--am-sage); }
.notice {
  margin-top: 24px;
  font-size: 11.5px; color: var(--am-muted);
  line-height: 1.8;
  border-left: 2px solid var(--am-sage);
  padding-left: 12px;
}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="logo-box">
    <img src="image/adlermind_logo.png" alt="ADLER MIND 협동조합 로고">
  </div>
  <div class="login-box">
    <div class="login-label">MEMBERS ONLY</div>
    <div class="login-title">조합원 전용 공간</div>
    <div class="field-label">비밀번호</div>
    <input class="pw-input" type="password" id="pwInput"
           placeholder="비밀번호를 입력하세요"
           onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-err" id="loginErr">비밀번호가 맞지 않습니다.</div>
    <button class="login-btn" onclick="doLogin()">입장하기</button>
  </div>
  <a class="back-link" href="index.html">&larr; 홈으로 돌아가기</a>
  <div class="notice">
    조합원 전용 공간입니다. 비밀번호는 조합원에게 별도 공지됩니다.<br>
    문의: adlermindcoop@gmail.com
  </div>
</div>

<script>
const PASSWORD = '123456';

function doLogin() {
  const val = document.getElementById('pwInput').value;
  const err = document.getElementById('loginErr');
  if (val === PASSWORD) {
    sessionStorage.setItem('am_member', '1');
    window.location.href = 'members-home.html';
  } else {
    err.style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}
</script>
</body>
</html>
