<!DOCTYPE html>
<!-- 이메일 회원 세션과 조합원 권한을 순서대로 확인하는 조합원 마당 입구입니다. -->
<html lang="ko">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><link rel="icon" href="/favicon.ico" sizes="any"><title>조합원 마당 · ADLER MIND 협동조합</title><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&family=Noto+Sans+KR:wght@300;400&family=Raleway:wght@300&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="member-auth.js"></script><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#FAFAF8;color:#6B6B6B;font-family:'Noto Sans KR',sans-serif;font-weight:300}.wrap{max-width:390px;text-align:center}.logo{height:57px;margin-bottom:30px}.box{background:#fff;border:1px solid #e8e4e0;padding:38px 32px}.label{font:300 10px Raleway,sans-serif;letter-spacing:.22em;color:#98928d}.title{font:400 18px 'Noto Serif KR',serif;margin:16px 0}.message{font-size:12px;line-height:1.8}.actions{display:flex;justify-content:center;gap:9px;flex-wrap:wrap;margin-top:24px}.button{border:1px solid #8FBFB8;background:#fff;color:#587772;padding:10px 14px;text-decoration:none;font:inherit;font-size:11.5px;cursor:pointer}.primary{background:#8FBFB8;color:#fff}.hidden{display:none}.back{display:inline-block;margin-top:20px;font-size:11px;color:#98928d;text-decoration:none}</style></head>
<body><main class="wrap"><a href="index.html"><img class="logo" src="image/adlermind_logo.png" alt="ADLER MIND 협동조합"></a><section class="box"><div class="label">MEMBERS ONLY</div><h1 class="title">조합원 전용 공간</h1><p class="message" id="message">로그인과 조합원 권한을 확인하고 있습니다.</p><div class="actions hidden" id="actions"><a class="button primary" href="account-home.html">내 계정</a><a class="button" href="index.html">홈으로</a></div></section><a class="back" href="account.html?next=members.html">이메일 회원 로그인</a></main><script>
async function init(){const client=window.AMMemberAuth.client;const {data:{session}}=await client.auth.getSession();if(!session){location.replace('account.html?next=members.html');return;}const member=await window.AMMemberAuth.getActiveMember();if(member){location.replace('members-home.html');return;}document.getElementById('message').textContent='로그인은 확인되었지만 활성 조합원 권한이 없습니다. 일반회원 계정은 그대로 유지되며, 조합원 등록이 필요하면 조합에 문의해 주세요.';document.getElementById('actions').classList.remove('hidden');}init();
</script></body></html>
