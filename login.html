<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.ico" sizes="any">
<title>로그인 · ADLER MIND 협동조합</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&family=Noto+Sans+KR:wght@300;400&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --am-rose:   #E8929A;
  --am-sage:   #8FBFB8;
  --am-gray:   #6B6B6B;
  --am-pale:   #D8D8DC;
  --am-bg:     #FAFAF8;
  --am-muted:  #9a9490;
  --am-border: #e8e4e0;
  --am-white:  #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 300;
  background: var(--am-bg);
  color: var(--am-gray);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.wrap { width: 100%; max-width: 380px; }
.logo-box { text-align: center; margin-bottom: 32px; }
.logo-box a { display: inline-block; }
.logo-box img { height: 57px; margin-top: 4px; }

.box {
  background: var(--am-white);
  border: 0.5px solid var(--am-border);
  padding: 36px 32px 40px;
}
.box-label {
  font-family: 'Raleway', sans-serif;
  font-size: 10px; font-weight: 200;
  letter-spacing: 0.22em; color: var(--am-muted);
  text-transform: uppercase;
  text-align: center; margin-bottom: 24px;
}

/* 탭 */
.tabs {
  display: flex; border-bottom: 0.5px solid var(--am-border);
  margin-bottom: 28px;
}
.tab-btn {
  flex: 1; padding: 10px;
  background: none; border: none;
  font-size: 13px; font-family: 'Noto Sans KR', sans-serif;
  font-weight: 300; color: var(--am-muted);
  cursor: pointer; letter-spacing: 0.04em;
  border-bottom: 1.5px solid transparent;
  margin-bottom: -0.5px;
  transition: color 0.15s, border-color 0.15s;
}
.tab-btn.active { color: var(--am-sage); border-bottom-color: var(--am-sage); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* 폼 */
.field { margin-bottom: 16px; }
.field-label { font-size: 11px; color: var(--am-muted); margin-bottom: 6px; }
.field-input {
  width: 100%;
  border: 0.5px solid var(--am-border); border-radius: 0;
  padding: 12px 14px;
  font-size: 14px; font-family: 'Noto Sans KR', sans-serif;
  font-weight: 300; background: var(--am-bg); color: var(--am-gray);
  letter-spacing: 0.06em;
  transition: border-color 0.15s;
}
.field-input:focus { outline: none; border-color: var(--am-sage); }
.field-hint { font-size: 11px; color: var(--am-muted); margin-top: 5px; }

.err-msg {
  font-size: 12px; color: var(--am-rose);
  margin-top: 4px; display: none;
}
.ok-msg {
  font-size: 12px; color: var(--am-sage);
  margin-top: 4px; display: none;
}

.submit-btn {
  width: 100%; margin-top: 8px;
  padding: 13px;
  background: var(--am-sage); color: #fff;
  border: none;
  font-size: 13px; font-family: 'Noto Sans KR', sans-serif;
  font-weight: 300; letter-spacing: 0.06em;
  cursor: pointer; transition: background 0.15s;
}
.submit-btn:hover { background: #6fa8a0; }
.submit-btn:disabled { background: var(--am-pale); cursor: default; }

.back-link {
  display: block; text-align: center; margin-top: 20px;
  font-size: 12px; color: var(--am-muted); text-decoration: none;
  letter-spacing: 0.04em;
}
.back-link:hover { color: var(--am-sage); }

.notice {
  margin-top: 24px;
  font-size: 11.5px; color: var(--am-muted);
  line-height: 1.8;
  border-left: 2px solid var(--am-sage);
  padding-left: 12px;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-box">
    <a href="index.html">
      <img src="image/adlermind_logo.png" alt="ADLER MIND 협동조합 로고">
    </a>
  </div>

  <div class="box">
    <div class="box-label">MEMBER SPACE</div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">로그인</button>
      <button class="tab-btn" onclick="switchTab('signup')">회원가입</button>
    </div>

    <!-- 로그인 탭 -->
    <div class="tab-panel active" id="panelLogin">
      <div class="field">
        <div class="field-label">별칭 (닉네임)</div>
        <input class="field-input" type="text" id="loginNick" placeholder="가입 시 사용한 별칭"
               autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="field">
        <div class="field-label">비밀번호</div>
        <input class="field-input" type="password" id="loginPw" placeholder="비밀번호"
               autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="err-msg" id="loginErr"></div>
      <button class="submit-btn" id="loginBtn" onclick="doLogin()">로그인</button>
    </div>

    <!-- 회원가입 탭 -->
    <div class="tab-panel" id="panelSignup">
      <div class="field">
        <div class="field-label">별칭 (닉네임)</div>
        <input class="field-input" type="text" id="signupNick" placeholder="사이트에서 사용할 이름"
               autocomplete="username" maxlength="20" oninput="clearSignupErr()">
        <div class="field-hint">· 한글·영문·숫자 2~20자</div>
        <div class="field-hint">· 실명·전화번호·이메일을 쓰지 마세요</div>
        <div class="err-msg" id="nickErr"></div>
      </div>
      <div class="field">
        <div class="field-label">비밀번호</div>
        <input class="field-input" type="password" id="signupPw" placeholder="6자 이상"
               autocomplete="new-password" oninput="clearSignupErr()">
      </div>
      <div class="field">
        <div class="field-label">비밀번호 확인</div>
        <input class="field-input" type="password" id="signupPw2" placeholder="비밀번호 재입력"
               autocomplete="new-password" onkeydown="if(event.key==='Enter')doSignup()" oninput="clearSignupErr()">
      </div>
      <div class="err-msg" id="signupErr"></div>
      <div class="ok-msg" id="signupOk"></div>
      <button class="submit-btn" id="signupBtn" onclick="doSignup()">가입하기</button>
    </div>
  </div>

  <a class="back-link" href="index.html">&larr; 홈으로 돌아가기</a>
  <div class="notice">
    별칭과 비밀번호만으로 가입할 수 있습니다.<br>
    개인정보는 수집하지 않습니다.
  </div>
</div>

<script>
const SB_URL = 'https://jboceiacgczkqkhqcmqu.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impib2NlaWFjZ2N6a3FraHFjbXF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1OTg1MTYsImV4cCI6MjA5ODE3NDUxNn0.9jHLNB8PVDrWlSc5CDGz5j6ZF9yaKwrnzICvvvsFbvA';
const _sb = supabase.createClient(SB_URL, SB_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true
  }
});

async function nicknameToEmail(nickname) {
  const normalized = nickname.normalize('NFKC').trim().toLowerCase();
  const bytes = new TextEncoder().encode(normalized);
  const hash = await crypto.subtle.digest('SHA-256', bytes);
  const hex = Array.from(new Uint8Array(hash), byte => byte.toString(16).padStart(2, '0')).join('');
  return `u${hex.slice(0, 40)}@adlermind.co.kr`;
}

// 이미 로그인된 경우 마이페이지로 이동
_sb.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'mypage.html';
});

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) =>
    b.classList.toggle('active', (tab === 'login' ? 0 : 1) === i));
  document.getElementById('panelLogin').classList.toggle('active', tab === 'login');
  document.getElementById('panelSignup').classList.toggle('active', tab === 'signup');
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
}
function hideMsg(id) { document.getElementById(id).style.display = 'none'; }
function clearSignupErr() {
  ['nickErr','signupErr','signupOk'].forEach(hideMsg);
}

// ── 로그인 ──
async function doLogin() {
  const nick = document.getElementById('loginNick').value.trim();
  const pw   = document.getElementById('loginPw').value;
  hideMsg('loginErr');

  if (!nick || !pw) { showErr('loginErr', '별칭과 비밀번호를 모두 입력해주세요.'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '로그인 중...';

  const email = await nicknameToEmail(nick);
  const { error } = await _sb.auth.signInWithPassword({ email, password: pw });

  btn.disabled = false; btn.textContent = '로그인';

  if (error) {
    showErr('loginErr', '별칭 또는 비밀번호가 맞지 않습니다.');
    return;
  }
  window.location.href = 'mypage.html';
}

// ── 회원가입 ──
async function doSignup() {
  const nick = document.getElementById('signupNick').value.trim();
  const pw   = document.getElementById('signupPw').value;
  const pw2  = document.getElementById('signupPw2').value;
  clearSignupErr();

  if (!nick) { showErr('nickErr', '별칭을 입력해주세요.'); return; }
  if (nick.length < 2) { showErr('nickErr', '별칭은 2자 이상이어야 합니다.'); return; }
  if (!pw || pw.length < 6) { showErr('signupErr', '비밀번호는 6자 이상이어야 합니다.'); return; }
  if (pw !== pw2) { showErr('signupErr', '비밀번호가 일치하지 않습니다.'); return; }

  const btn = document.getElementById('signupBtn');
  btn.disabled = true; btn.textContent = '가입 처리 중...';

  // 별칭으로 내부 로그인 주소를 계산하되 화면이나 공개 테이블에는 저장하지 않음
  const email = await nicknameToEmail(nick);
  const { data, error } = await _sb.auth.signUp({ email, password: pw });

  if (error) {
    btn.disabled = false; btn.textContent = '가입하기';
    showErr('signupErr', '가입 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
    console.error(error);
    return;
  }

  // site_users에 닉네임 + 내부 이메일 등록
  const userId = data.user.id;
  const token  = data.session?.access_token || SB_KEY;
  const insertRes = await fetch(`${SB_URL}/rest/v1/site_users`, {
    method: 'POST',
    headers: {
      apikey: SB_KEY,
      Authorization: `Bearer ${token}`,
      'Content-Type': 'application/json',
      Prefer: 'return=minimal'
    },
    body: JSON.stringify({ user_id: userId, nickname: nick })
  });

  btn.disabled = false; btn.textContent = '가입하기';

  if (!insertRes.ok) {
    console.error('site_users insert failed:', await insertRes.text());
  }

  if (data.session) {
    window.location.href = 'mypage.html';
  } else {
    const ok = document.getElementById('signupOk');
    ok.textContent = '가입이 완료되었습니다. 로그인 탭에서 입장해주세요.';
    ok.style.display = 'block';
    setTimeout(() => switchTab('login'), 2000);
  }
}
</script>
</body>
</html>
