<!DOCTYPE html>
<!-- 이메일 회원의 기본 계정 화면과 조합원 권한 상태를 보여주는 페이지입니다. -->
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><link rel="icon" href="/favicon.ico" sizes="any"><title>내 계정 · ADLER MIND 협동조합</title><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="member-auth.js"></script><style>*{box-sizing:border-box}body{margin:0;background:#FAFAF8;color:#6B6B6B;font-family:'Noto Sans KR',sans-serif;font-weight:300}.wrap{max-width:720px;margin:0 auto;padding:54px 22px}.logo{height:55px}.card{margin-top:34px;background:#fff;border:1px solid #e8e4e0;padding:34px}.eyebrow{font-size:10px;letter-spacing:.2em;color:#98928d}.title{font:400 22px 'Noto Serif KR',serif;margin:12px 0}.info{font-size:13px;line-height:1.9}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:25px}.button{display:inline-block;border:1px solid #8FBFB8;padding:10px 15px;color:#5e7773;text-decoration:none;background:#fff;font-size:12px;cursor:pointer}.primary{background:#8FBFB8;color:#fff}.notice{margin-top:22px;padding:13px;background:#f7f6f3;font-size:11.5px;line-height:1.7}.hidden{display:none}</style></head><body><main class="wrap"><a href="index.html"><img class="logo" src="image/adlermind_logo.png" alt="ADLER MIND 협동조합"></a><section class="card"><div class="eyebrow">MY ACCOUNT</div><h1 class="title" id="greeting">회원정보를 확인하고 있습니다.</h1><div class="info" id="accountInfo"></div><div class="actions"><a class="button primary hidden" id="adminLink" href="admin.html">관리자 페이지</a><a class="button primary hidden" id="memberLink" href="members-home.html">조합원 마당</a><a class="button" href="index.html">홈으로</a><button class="button" id="logoutButton" type="button">로그아웃</button></div><p class="notice" id="memberNotice">일반회원 계정으로 로그인했습니다. 조합원 명부와 이메일이 일치하는 활성 계정에는 조합원 마당이 열립니다.</p></section></main><script>
const client=window.AMMemberAuth.client;
async function init(){const {data:{session}}=await client.auth.getSession();if(!session){location.replace('account.html?next=account-home.html');return;}const {data:profile}=await client.from('site_profiles').select('display_name,nickname').eq('user_id',session.user.id).maybeSingle();if(!profile){location.replace('login.html');return;}const name=profile.nickname||profile.display_name;document.getElementById('greeting').textContent=`${name}님, 반갑습니다.`;document.getElementById('accountInfo').textContent=session.user.email;const member=await window.AMMemberAuth.getActiveMember();if(member){document.getElementById('memberLink').classList.remove('hidden');document.getElementById('memberNotice').textContent='활성 조합원 권한이 확인되었습니다. 조합원 마당을 이용할 수 있습니다.';}
// 관리자 권한은 조합원 권한과 별도 계층이므로 따로 확인한다.
const admin=await window.AMMemberAuth.getActiveAdmin();if(admin){document.getElementById('adminLink').classList.remove('hidden');}}
document.getElementById('logoutButton').addEventListener('click',async()=>{await client.auth.signOut();location.replace('index.html');});init();
</script></body></html>
